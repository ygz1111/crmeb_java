crmeb:
  version: CRMEB-JAVA-KY-v1.4
  imagePath: /home/crmeb/upload/
  asyncConfig: true
  mlServiceUrl: http://ai-server:3000
  demoSite: true

recommend:
  server:
    url: http://recommend-server:5000

server:
  port: 20410
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/single_open?characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: crmeb123456
  redis:
    host: redis
    port: 6379
    password:
    timeout: 10000
    database: 6
    jedis:
      pool:
        max-active: 50
        max-wait: -1
        max-idle: 10
        min-idle: 0

debug: false
logging:
  level:
    io.swagger.*: error
    com.zbjk.crmeb: info
    org.springframework.boot.autoconfigure: ERROR
  config: classpath:logback-spring.xml
  file:
    path: ./crmeb_log

mybatis-plus:
  configuration:
    log-impl:

swagger:
  basic:
    enable: false
    check: false

