<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 180" width="456" height="180">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="456" height="180" fill="#ffffff" rx="0"/>
  
  <!-- Icon: Abstract geometric shopping bag / C mark -->
  <g transform="translate(30, 18)">
    <!-- Main bag body -->
    <path d="M38 10 L38 85 C38 95 46 102 56 102 L84 102 C94 102 102 95 102 85 L102 10" 
          fill="none" stroke="url(#iconGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bag opening -->
    <path d="M18 10 L122 10" 
          fill="none" stroke="url(#iconGrad)" stroke-width="7" stroke-linecap="round"/>
    <!-- Handle left -->
    <path d="M38 10 C38 -8 58 -15 70 -2" 
          fill="none" stroke="url(#iconGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Handle right -->
    <path d="M102 10 C102 -8 82 -15 70 -2" 
          fill="none" stroke="url(#iconGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Accent dot -->
    <circle cx="70" cy="55" r="5" fill="#34D399"/>
  </g>
  
  <!-- Wordmark: CRMEB -->
  <g transform="translate(170, 0)">
    <text x="0" y="75" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="52" font-weight="700" letter-spacing="4" fill="#0F172A">
      CRMEB
    </text>
    <!-- Green underline accent -->
    <rect x="4" y="95" width="180" height="3" rx="1.5" fill="url(#brandGrad)"/>
  </g>
  
  <!-- Tagline -->
  <text x="174" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="16" font-weight="400" letter-spacing="3" fill="#64748B">
    &#x65B0;&#x96F6;&#x552E;&#x6570;&#x5B57;&#x5316;
  </text>
</svg>
