upstream admin_backend {
    server crmeb-admin:20400;
}

upstream front_backend {
    server crmeb-front:20410;
}

upstream ai_backend {
    server ai-server:3000;
}

upstream recommend_backend {
    server recommend-server:5000;
}

server {
    listen 80;
    server_name _;

    charset utf-8;
    client_max_body_size 50m;

    location = / {
        return 302 /h5/;
    }

    location /h5/ {
        alias /usr/share/nginx/html/h5/;
        index index.html;
        try_files $uri $uri/ /h5/index.html;
    }

    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location /api/admin/ {
        proxy_pass http://admin_backend/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location /api/front/ {
        proxy_pass http://front_backend/api/front/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location /api/public/ {
        proxy_pass http://front_backend/api/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/identify {
        proxy_pass http://ai_backend/api/identify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20m;
        proxy_read_timeout 30s;
    }

    location /api/recommend/ {
        proxy_pass http://recommend_backend/api/recommend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /crmebimage/ {
        proxy_pass http://admin_backend/crmebimage/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploadf/ {
        proxy_pass http://admin_backend/uploadf/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /swagger-ui/ {
        proxy_pass http://admin_backend/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /swagger-resources {
        proxy_pass http://admin_backend/swagger-resources;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v2/ {
        proxy_pass http://admin_backend/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /doc.html {
        proxy_pass http://admin_backend/doc.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
